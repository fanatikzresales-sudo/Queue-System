name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stamp version from git tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          (Get-Content version.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content version.py
          Write-Host "APP_VERSION set to $version"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0" pillow
          pip install pywebview[winforms] plyer

      - name: Convert logo to icon
        run: python convert_icon.py

      - name: Build EXE
        run: pyinstaller walmart_queue.spec --clean --noconfirm

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/FRQueueOptimizer.exe

  # ── macOS .app ───────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stamp version from git tag
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed -i '' "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" version.py
          echo "APP_VERSION set to $VERSION"

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install "pyinstaller>=6.0.0" pillow
          pip3 install pywebview plyer

      - name: Convert logo to icon
        run: python3 convert_icon.py

      - name: Build .app bundle
        run: pyinstaller walmart_queue.spec --clean --noconfirm

      - name: Zip the .app bundle
        run: |
          cd dist
          zip -r FRQueueOptimizer-Mac.zip FRQueueOptimizer.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/FRQueueOptimizer-Mac.zip

  # ── Android APK (mobile companion) ───────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: mobile
        run: |
          npm ci
          npm run sync:www
          npm run build:js
          npx cap sync android
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK for release
        run: |
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk mobile/FRQueueOptimizer-Android.apk
          cd mobile && zip FRQueueOptimizer-Android.zip FRQueueOptimizer-Android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            mobile/FRQueueOptimizer-Android.apk
            mobile/FRQueueOptimizer-Android.zip

  # ── iOS compile check (mobile companion) ─────────────────────────────────────
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Build iOS (compile only)
        working-directory: mobile
        run: |
          npm ci
          npm run sync:www
          npm run build:js
          npx cap sync ios
          node scripts/patch-ios-plugins.js
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build CODE_SIGNING_ALLOWED=NO

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-mac, build-android]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.build-windows.result == 'success' && needs.build-mac.result == 'success'

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-files

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-app
          path: release-files

      - name: Download Android artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FR Queue Optimizer ${{ github.ref_name }}"
          body: |
            ## FR Queue Optimizer ${{ github.ref_name }}

            ### What's new
            - **Custom Start Time toggle:** Last-Min Drop vs Long Drop Delay
            - **Last-min presets:** 1,500 / 2,000 / 3,000 ms final delays (2–5 min before queue)
            - **Compatible start times** when you pick a preset or target final delay
            - More drop delay presets for Instant and Deferred switch modes

            ### Download
            | Platform | File |
            |----------|------|
            | **Windows** | `FRQueueOptimizer.exe` — double-click to open |
            | **Mac** | `FRQueueOptimizer-Mac.zip` — unzip, drag to Applications |
            | **Android** | `FRQueueOptimizer-Android.apk` (when available) |

            ### Auto-update
            When you open the app, it checks for updates automatically.
            If a newer version is available, it downloads in the background.
            **Close the app** when the update banner appears — it will reopen on the new version automatically.

            ### First time?
            - **Windows SmartScreen:** Click "More info" → "Run anyway"
            - **Mac Gatekeeper:** Right-click → Open → Open
          files: |
            release-files/FRQueueOptimizer.exe
            release-files/FRQueueOptimizer-Mac.zip
            release-files/FRQueueOptimizer-Android.apk
            release-files/FRQueueOptimizer-Android.zip
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
