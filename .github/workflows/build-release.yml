name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0" pillow
          pip install pywebview[winforms]

      - name: Convert logo to icon
        run: python convert_icon.py

      - name: Build EXE
        run: pyinstaller walmart_queue.spec --clean --noconfirm

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/WalmartQueueOptimizer.exe

  # ── macOS .app ───────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install "pyinstaller>=6.0.0" pillow
          pip3 install pywebview

      - name: Convert logo to icon
        run: python3 convert_icon.py

      - name: Build .app bundle
        run: pyinstaller walmart_queue.spec --clean --noconfirm

      - name: Zip the .app bundle
        run: |
          cd dist
          zip -r WalmartQueueOptimizer-Mac.zip WalmartQueueOptimizer.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/WalmartQueueOptimizer-Mac.zip

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-files

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-app
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Walmart Queue Optimizer ${{ github.ref_name }}"
          body: |
            ## Walmart Queue Optimizer ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | **Windows** | `WalmartQueueOptimizer.exe` — double-click to open |
            | **Mac** | `WalmartQueueOptimizer-Mac.zip` — unzip, drag to Applications |

            ### First time?
            - **Windows SmartScreen:** Click "More info" → "Run anyway"
            - **Mac Gatekeeper:** Right-click → Open → Open
          files: |
            release-files/WalmartQueueOptimizer.exe
            release-files/WalmartQueueOptimizer-Mac.zip
          draft: false
          prerelease: false
